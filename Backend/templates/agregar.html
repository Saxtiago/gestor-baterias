<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Batería</title>
</head>
<body>
    <h2>Registrar Nueva Batería</h2>
    <form action="/api/agregar" method="POST">
        <label>ID:</label><br>
        <input type="number" name="id" required><br><br>
        
        <label>Marca:</label><br>
        <input type="text" name="marca" required><br><br>
        
        <label>Modelo/Referencia:</label><br>
        <input type="text" name="modelo" required><br><br>
        
        <button type="submit">Guardar en Excel</button>
        <a href="/gestion_baterias">Volver</a>
    </form>
</body>
</html>
